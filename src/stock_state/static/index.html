<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock State</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">SS</div>
          <div>
            <h1>Stock State</h1>
            <p id="provenance">yfinance · EOD_OR_DELAYED</p>
          </div>
        </div>
        <form id="ticker-form" class="ticker-form">
          <label for="ticker-input">Ticker</label>
          <input id="ticker-input" name="ticker" value="AAPL" autocomplete="off" spellcheck="false" />
          <button id="run-button" type="submit">Analyze</button>
          <button id="refresh-button" type="button">Refresh</button>
        </form>
      </header>

      <section id="status" class="status" aria-live="polite"></section>

      <section class="summary-band">
        <div>
          <span class="eyebrow">Ticker</span>
          <strong id="summary-ticker">-</strong>
        </div>
        <div>
          <span class="eyebrow">As of</span>
          <strong id="summary-date">-</strong>
        </div>
        <div>
          <span class="eyebrow">Close</span>
          <strong id="summary-close">-</strong>
        </div>
        <div>
          <span class="eyebrow">Day</span>
          <strong id="summary-day">-</strong>
        </div>
        <div>
          <span class="eyebrow">Attribution</span>
          <strong id="summary-classification">-</strong>
        </div>
      </section>

      <section class="verdict-band">
        <div class="verdict-main">
          <span class="eyebrow">Judgement</span>
          <strong id="verdict-stance" role="button" tabindex="0">-</strong>
          <p id="verdict-caveat">规则型技术判读，未经前向收益验证</p>
          <div id="rule-path" class="rule-path" hidden></div>
        </div>
        <div class="confidence-box">
          <span class="eyebrow">Confidence</span>
          <strong id="verdict-confidence">-</strong>
          <p id="verdict-contexts">-</p>
        </div>
        <div class="risk-box">
          <span class="eyebrow">Risk Flags</span>
          <div id="risk-flags" class="chip-row"></div>
        </div>
        <div class="evidence-box">
          <span class="eyebrow">Evidence</span>
          <ol id="evidence-list"></ol>
        </div>
      </section>

      <section class="brief-panel">
        <div class="brief-header">
          <div>
            <span class="eyebrow">AI Brief</span>
            <strong>今日数字总结</strong>
          </div>
          <button id="brief-refresh" type="button">Regenerate</button>
        </div>
        <div id="brief-status" class="brief-status">-</div>
        <div id="brief-content" class="brief-content"></div>
      </section>

      <section class="dashboard">
        <section class="panel span-2" id="panel-attribution"></section>
        <section class="panel" id="panel-volume"></section>
        <section class="panel" id="panel-crowding"></section>
        <section class="panel" id="panel-valuation"></section>
        <section class="panel" id="panel-relative"></section>
        <section class="panel" id="panel-fundamentals"></section>
        <section class="panel" id="panel-analyst"></section>
      </section>

      <section class="debug-panel">
        <details>
          <summary>Debug / Explain</summary>
          <div id="debug-content" class="debug-content"></div>
        </details>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
